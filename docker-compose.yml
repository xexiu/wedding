services:
  postgres:
    image: postgres:16-alpine
    container_name: wedding-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - wedding_postgres_data:/var/lib/postgresql/data

volumes:
  wedding_postgres_data:
